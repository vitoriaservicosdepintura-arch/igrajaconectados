<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Viewport otimizado para mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#4F46E5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ChurchConnect" />
    <meta name="application-name" content="ChurchConnect" />
    <meta name="format-detection" content="telephone=yes" />
    <meta name="msapplication-TileColor" content="#4F46E5" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Plataforma completa para igrejas cristãs. Gerencie membros, cultos, eventos, doações e muito mais." />
    <meta name="keywords" content="igreja, cristã, gestão, membros, cultos, eventos, doações, SaaS" />
    <meta name="author" content="ChurchConnect" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph (Facebook, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ChurchConnect - Plataforma para Igrejas" />
    <meta property="og:description" content="Plataforma completa para igrejas cristãs. Gerencie membros, cultos, eventos, doações e muito mais." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:url" content="https://churchconnect.app" />
    <meta property="og:site_name" content="ChurchConnect" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ChurchConnect - Plataforma para Igrejas" />
    <meta name="twitter:description" content="Plataforma completa para igrejas cristãs." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Favicon e Icons -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect para performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- DNS Prefetch -->
    <link rel="dns-prefetch" href="https://api.whatsapp.com" />
    <link rel="dns-prefetch" href="https://www.google.com" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <title>ChurchConnect - Plataforma para Igrejas Cristãs</title>
    
    <!-- Splash Screen e iOS Safe Areas -->
    <style>
      /* Prevent FOUC */
      html { visibility: visible; opacity: 1; }
      
      /* iOS Safe Areas */
      body {
        padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      }
      
      /* Loading Screen */
      .loading-screen {
        position: fixed;
        inset: 0;
        background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      .loading-text {
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 18px;
        margin-top: 20px;
        font-weight: 500;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Smooth scrolling */
      html {
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Better tap targets for mobile */
      button, a, input, select, textarea {
        touch-action: manipulation;
      }
      
      /* Prevent text selection on buttons */
      button {
        -webkit-user-select: none;
        user-select: none;
      }
      
      /* Fix iOS input zoom */
      @media screen and (max-width: 768px) {
        input, select, textarea {
          font-size: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
      <div class="loading-spinner"></div>
      <p class="loading-text">ChurchConnect</p>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Hide loading screen when app loads -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('loading-screen');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(function() {
              loader.remove();
            }, 500);
          }
        }, 500);
      });
    </script>
  </body>
</html>
